  <ellipse cx="136" cy="72" rx="3.5" ry="6" fill="#9070c0" opacity="0.7"/>
  <ellipse cx="136" cy="78" rx="3" ry="4" fill="#a080d0" opacity="0.6"/>
  <ellipse cx="154" cy="74" rx="3.5" ry="6" fill="#9070c0" opacity="0.7"/>
