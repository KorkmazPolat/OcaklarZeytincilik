  <line x1="120" y1="104" x2="118" y2="70" stroke="#7060a0" stroke-width="1.5" opacity="0.6"/>
  <line x1="136" y1="104" x2="136" y2="68" stroke="#7060a0" stroke-width="1.5" opacity="0.6"/>
  <line x1="152" y1="104" x2="154" y2="70" stroke="#7060a0" stroke-width="1.5" opacity="0.6"/>
  <line x1="168" y1="104" x2="168" y2="74" stroke="#7060a0" stroke-width="1.5" opacity="0.6"/>

