<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260">
  <defs>
    <linearGradient id="jarGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="rgba(180,210,140,0.6)"/>
      <stop offset="0.4" stop-color="rgba(220,240,180,0.75)"/>
      <stop offset="0.7" stop-color="rgba(190,220,150,0.65)"/>
      <stop offset="1" stop-color="rgba(140,175,100,0.6)"/>
    </linearGradient>
    <linearGradient id="lidGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#d0d8c8"/>
      <stop offset="1" stop-color="#909a88"/>
    </linearGradient>
    <linearGradient id="labelGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="rgba(255,252,240,0.95)"/>
      <stop offset="1" stop-color="rgba(240,232,205,0.92)"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="252" rx="52" ry="8" fill="rgba(0,0,0,0.12)"/>

  <!-- Jar body -->
  <path d="M38 90 C36 95 34 110 34 128 L34 200 C34 230 60 248 100 248 C140 248 166 230 166 200 L166 128 C166 110 164 95 162 90 Z" fill="url(#jarGrad)"/>

  <!-- Olives inside jar -->
  <!-- Row 1 -->
  <ellipse cx="68" cy="148" rx="14" ry="11" fill="#4a8020" opacity="0.82"/>
  <ellipse cx="68" cy="148" rx="5" ry="3.5" fill="rgba(255,255,255,0.3)" transform="translate(-3,-3)"/>
  <ellipse cx="95" cy="142" rx="14" ry="11" fill="#6aaa30" opacity="0.8"/>
  <ellipse cx="95" cy="142" rx="5" ry="3.5" fill="rgba(255,255,255,0.28)" transform="translate(-3,-3)"/>
  <ellipse cx="122" cy="148" rx="14" ry="11" fill="#4a8020" opacity="0.82"/>
  <ellipse cx="122" cy="148" rx="5" ry="3.5" fill="rgba(255,255,255,0.3)" transform="translate(-3,-3)"/>

  <!-- Row 2 -->
  <ellipse cx="56" cy="172" rx="13" ry="10" fill="#5a9428" opacity="0.75"/>
  <ellipse cx="56" cy="172" rx="4.5" ry="3" fill="rgba(255,255,255,0.28)" transform="translate(-3,-3)"/>
  <ellipse cx="82" cy="168" rx="13" ry="10" fill="#3a7018" opacity="0.78"/>
  <ellipse cx="82" cy="168" rx="4.5" ry="3" fill="rgba(255,255,255,0.25)" transform="translate(-3,-3)"/>
  <ellipse cx="108" cy="166" rx="13" ry="10" fill="#6aaa30" opacity="0.75"/>
  <ellipse cx="108" cy="166" rx="4.5" ry="3" fill="rgba(255,255,255,0.28)" transform="translate(-3,-3)"/>
  <ellipse cx="134" cy="172" rx="13" ry="10" fill="#4a8020" opacity="0.75"/>

  <!-- Row 3 (brine / bottom) -->
  <ellipse cx="70" cy="195" rx="12" ry="9" fill="#3a6818" opacity="0.65"/>
  <ellipse cx="100" cy="190" rx="12" ry="9" fill="#5a9028" opacity="0.65"/>
  <ellipse cx="128" cy="195" rx="12" ry="9" fill="#3a6818" opacity="0.65"/>

  <!-- Jar neck / shoulder -->
  <path d="M38 90 C40 80 54 72 100 72 C146 72 160 80 162 90" fill="none" stroke="rgba(160,200,120,0.4)" stroke-width="2"/>

  <!-- Label -->
  <rect x="44" y="100" width="112" height="36" rx="5" fill="url(#labelGrad)"/>
  <rect x="48" y="105" width="104" height="0.8" fill="#607a40" opacity="0.3"/>
  <rect x="48" y="131" width="104" height="0.8" fill="#607a40" opacity="0.3"/>
  <!-- Label text -->
  <rect x="56" y="112" width="88" height="5" rx="2.5" fill="#304810" opacity="0.65"/>
  <rect x="64" y="122" width="72" height="3.5" rx="1.75" fill="#304810" opacity="0.4"/>

  <!-- Lid rim (flange) -->
  <path d="M54 75 Q100 65 146 75 L148 85 Q100 74 52 85 Z" fill="#a0aca0" opacity="0.9"/>

  <!-- Lid top -->
  <path d="M54 75 Q100 62 146 75 Q100 68 54 75 Z" fill="url(#lidGrad)"/>
  <ellipse cx="100" cy="70" rx="48" ry="12" fill="url(#lidGrad)"/>

  <!-- Lid center -->
  <ellipse cx="100" cy="68" rx="20" ry="5" fill="#b0bca8" opacity="0.6"/>
  <ellipse cx="100" cy="67" rx="8" ry="2" fill="#c8d4c0" opacity="0.5"/>

  <!-- Glass shine left -->
  <path d="M40 108 C37 140 37 188 40 218" stroke="rgba(255,255,255,0.42)" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M48 104 C46 130 46 170 48 196" stroke="rgba(255,255,255,0.22)" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
