<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 280">
  <defs>
    <linearGradient id="tinBody" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#7a8878"/>
      <stop offset="0.25" stop-color="#b0bca8"/>
      <stop offset="0.55" stop-color="#ccd5c4"/>
      <stop offset="0.8" stop-color="#9aa898"/>
      <stop offset="1" stop-color="#606e5e"/>
    </linearGradient>
    <linearGradient id="tinTop" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#d8e0d0"/>
      <stop offset="1" stop-color="#a8b4a0"/>
    </linearGradient>
    <linearGradient id="tinSide" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#7a8878"/>
      <stop offset="1" stop-color="#9aa898"/>
    </linearGradient>
    <linearGradient id="labelGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fff8e0"/>
      <stop offset="1" stop-color="#f0dfa8"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="112" cy="268" rx="62" ry="9" fill="rgba(0,0,0,0.13)"/>

  <!-- Tin body (front face) -->
  <rect x="44" y="72" width="136" height="188" rx="10" fill="url(#tinBody)"/>

  <!-- Side face (3D perspective right) -->
  <path d="M180 72 L200 84 L200 256 L180 260 Z" fill="url(#tinSide)" opacity="0.85"/>

  <!-- Top face (3D perspective) -->
  <path d="M44 72 L64 60 L200 60 L180 72 Z" fill="url(#tinTop)"/>

  <!-- Handle on top -->
  <path d="M80 60 L80 42 Q112 34 144 42 L144 60" stroke="#7a8878" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M80 60 L80 42 Q112 34 144 42 L144 60" stroke="#b0bca8" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Label -->
  <rect x="56" y="100" width="112" height="130" rx="5" fill="url(#labelGrad)" opacity="0.96"/>
  <!-- Label top/bottom lines -->
  <rect x="60" y="107" width="104" height="1" fill="#8a7838" opacity="0.3"/>
  <rect x="60" y="224" width="104" height="1" fill="#8a7838" opacity="0.3"/>

  <!-- Brand name lines -->
  <rect x="70" y="118" width="84" height="7" rx="3.5" fill="#2d3c10" opacity="0.72"/>
  <rect x="76" y="130" width="72" height="5" rx="2.5" fill="#2d3c10" opacity="0.48"/>

  <!-- Olive motif on label -->
  <ellipse cx="96" cy="164" rx="9" ry="7" fill="#4a7820" opacity="0.65"/>
  <ellipse cx="112" cy="156" rx="9" ry="7" fill="#6aaa30" opacity="0.65"/>
  <ellipse cx="128" cy="164" rx="9" ry="7" fill="#4a7820" opacity="0.65"/>
  <path d="M90 162 Q112 148 134 162" stroke="#3a6010" stroke-width="2" fill="none" opacity="0.5"/>
  <ellipse cx="94" cy="162" rx="3" ry="2.2" fill="rgba(255,255,255,0.35)"/>
  <ellipse cx="110" cy="154" rx="3" ry="2.2" fill="rgba(255,255,255,0.35)"/>

  <!-- Volume text lines -->
  <rect x="80" y="193" width="64" height="4" rx="2" fill="#2d3c10" opacity="0.3"/>
  <rect x="84" y="202" width="56" height="3.5" rx="1.75" fill="#2d3c10" opacity="0.22"/>
  <rect x="88" y="211" width="48" height="3" rx="1.5" fill="#2d3c10" opacity="0.18"/>

  <!-- Metal sheen on body -->
  <rect x="48" y="80" width="12" height="172" rx="3" fill="rgba(255,255,255,0.22)"/>
  <rect x="62" y="78" width="5" height="174" rx="2" fill="rgba(255,255,255,0.12)"/>

  <!-- Right side sheen -->
  <path d="M185 88 L197 98 L197 248 L185 252" stroke="rgba(255,255,255,0.2)" stroke-width="3" fill="none"/>
</svg>
