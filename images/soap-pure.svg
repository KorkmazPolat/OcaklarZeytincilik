<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 200">
  <defs>
    <linearGradient id="soapTop" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8e8c8"/>
      <stop offset="1" stop-color="#e8c890"/>
    </linearGradient>
    <linearGradient id="soapFront" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f0daa8"/>
      <stop offset="1" stop-color="#d8b870"/>
    </linearGradient>
    <linearGradient id="soapSide" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#c8a050"/>
      <stop offset="1" stop-color="#b08840"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="130" cy="188" rx="72" ry="9" fill="rgba(0,0,0,0.1)"/>

  <!-- Soap bar – 3D view -->
  <!-- Front face -->
  <path d="M44 110 L44 168 Q44 178 130 178 Q216 178 216 168 L216 110 Z" fill="url(#soapFront)"/>

  <!-- Top face -->
  <path d="M44 110 L72 72 Q158 65 200 72 L216 110 Q158 102 44 110 Z" fill="url(#soapTop)"/>

  <!-- Right side face -->
  <path d="M216 110 L200 72 L200 128 L216 168 Z" fill="url(#soapSide)"/>

  <!-- Embossed lines (texture) on top face -->
  <path d="M80 95 Q136 88 188 95" stroke="rgba(180,140,70,0.4)" stroke-width="1.2" fill="none"/>
  <path d="M80 101 Q136 94 188 101" stroke="rgba(180,140,70,0.3)" stroke-width="0.8" fill="none"/>
  <path d="M82 107 Q136 100 186 107" stroke="rgba(180,140,70,0.25)" stroke-width="0.7" fill="none"/>

  <!-- Label / brand block on top -->
  <path d="M94 74 Q136 68 178 74 L174 104 Q136 98 98 104 Z" fill="rgba(255,248,220,0.6)" rx="4"/>

  <!-- Brand lines on top -->
  <path d="M106 82 Q136 77 166 82" stroke="#8a6a30" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M112 90 Q136 85 160 90" stroke="#8a6a30" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- Olive oil droplet icon on top -->
  <path d="M130 96 Q128 88 130 84 Q132 88 130 96 Z" fill="#8a7030" opacity="0.5"/>
  <circle cx="130" cy="84" r="3" fill="rgba(138,112,48,0.5)"/>

  <!-- Front face texture lines -->
  <path d="M52 128 L208 128" stroke="rgba(180,140,70,0.2)" stroke-width="0.8" fill="none"/>
  <path d="M52 145 L208 145" stroke="rgba(180,140,70,0.15)" stroke-width="0.7" fill="none"/>
  <path d="M52 162 L208 162" stroke="rgba(180,140,70,0.12)" stroke-width="0.6" fill="none"/>

  <!-- Front face brand name lines -->
  <rect x="92" y="118" width="76" height="5" rx="2.5" fill="#8a6a30" opacity="0.45"/>
  <rect x="100" y="128" width="60" height="3.5" rx="1.75" fill="#8a6a30" opacity="0.3"/>

  <!-- Soap corners rounding highlight -->
  <path d="M44 110 Q44 105 50 104" stroke="rgba(255,255,255,0.35)" stroke-width="2" fill="none"/>
  <path d="M44 168 Q44 176 60 178" stroke="rgba(200,170,100,0.3)" stroke-width="1.5" fill="none"/>

  <!-- Top face shine -->
  <path d="M76 90 Q110 82 150 86" stroke="rgba(255,255,255,0.45)" stroke-width="5" fill="none" stroke-linecap="round"/>
</svg>
