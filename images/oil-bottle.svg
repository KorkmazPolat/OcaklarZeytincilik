<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 340">
  <defs>
    <linearGradient id="bodyGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#3a5c14"/>
      <stop offset="0.35" stop-color="#5e8c28"/>
      <stop offset="0.65" stop-color="#4a7020"/>
      <stop offset="1" stop-color="#2a4010"/>
    </linearGradient>
    <linearGradient id="oilGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#c8a828" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#a08010" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="labelGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fff8e8"/>
      <stop offset="1" stop-color="#f0ddb0"/>
    </linearGradient>
    <linearGradient id="neckGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#3a5c14"/>
      <stop offset="0.4" stop-color="#5e8c28"/>
      <stop offset="1" stop-color="#2a4010"/>
    </linearGradient>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="90" cy="326" rx="44" ry="8" fill="rgba(0,0,0,0.13)"/>

  <!-- Bottle body -->
  <path d="M62 122 C44 132 40 155 40 175 L40 272 C40 296 60 310 90 310 C120 310 140 296 140 272 L140 175 C140 155 136 132 118 122 Z" fill="url(#bodyGrad)"/>

  <!-- Oil tint -->
  <path d="M62 122 C44 132 40 155 40 175 L40 272 C40 296 60 310 90 310 C120 310 140 296 140 272 L140 175 C140 155 136 132 118 122 Z" fill="url(#oilGrad)"/>

  <!-- Neck -->
  <path d="M78 48 L78 122 L102 122 L102 48 Z" fill="url(#neckGrad)"/>

  <!-- Shoulder -->
  <path d="M62 122 Q78 114 90 114 Q102 114 118 122" fill="rgba(60,92,20,0.6)"/>

  <!-- Cap -->
  <rect x="74" y="20" width="32" height="32" rx="7" fill="#1e2e0a"/>
  <rect x="70" y="42" width="40" height="10" rx="4" fill="#141e06"/>
  <!-- Cap shine -->
  <rect x="78" y="24" width="8" height="18" rx="4" fill="rgba(255,255,255,0.12)"/>

  <!-- Label background -->
  <rect x="50" y="178" width="80" height="96" rx="6" fill="url(#labelGrad)" opacity="0.96"/>
  <!-- Label border lines -->
  <rect x="54" y="184" width="72" height="1" fill="#8c7a40" opacity="0.3"/>
  <rect x="54" y="267" width="72" height="1" fill="#8c7a40" opacity="0.3"/>
  <!-- Label inner frame -->
  <rect x="56" y="188" width="68" height="77" rx="3" fill="none" stroke="#8c7a40" stroke-width="0.7" opacity="0.25"/>

  <!-- Brand name -->
  <rect x="62" y="196" width="56" height="6" rx="3" fill="#2d4012" opacity="0.75"/>
  <rect x="66" y="207" width="48" height="4" rx="2" fill="#2d4012" opacity="0.5"/>

  <!-- Olive motif -->
  <ellipse cx="80" cy="232" rx="7" ry="5.5" fill="#4a7820" opacity="0.7"/>
  <ellipse cx="90" cy="226" rx="7" ry="5.5" fill="#6aaa30" opacity="0.7"/>
  <ellipse cx="100" cy="232" rx="7" ry="5.5" fill="#4a7820" opacity="0.7"/>
  <path d="M76 230 Q90 219 104 230" stroke="#3a6010" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Olive highlights -->
  <ellipse cx="78" cy="230" rx="2.5" ry="1.8" fill="rgba(255,255,255,0.35)"/>
  <ellipse cx="88" cy="224" rx="2.5" ry="1.8" fill="rgba(255,255,255,0.35)"/>

  <!-- Volume/weight text line -->
  <rect x="68" y="250" width="44" height="3.5" rx="1.75" fill="#2d4012" opacity="0.3"/>
  <rect x="72" y="258" width="36" height="3" rx="1.5" fill="#2d4012" opacity="0.22"/>

  <!-- Glass shine left -->
  <path d="M48 152 C44 182 44 238 48 268" stroke="white" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.32"/>
  <path d="M55 144 C52 168 52 210 55 234" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.18"/>

  <!-- Neck shine -->
  <path d="M83 52 L83 116" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.22"/>
</svg>
